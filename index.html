<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarceTuCoach - Centro de Control de Salud</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .dark-bg { background: #0a0e27; color: #fff; }
  </style>
</head>
<body class="dark-bg">
  <div id="root"></div>
  <script>
    const { useState } = React;

    function Dashboard() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [duracion, setDuracion] = useState(12);
      const [edad, setEdad] = useState(35);
      const [experiencia, setExperiencia] = useState('Intermedio');
      const [fechaInicio, setFechaInicio] = useState('15/04/2026');

      const tabs = [
        { id: 'dashboard', label: 'Dashboard', icon: '📊' },
        { id: 'analiticas', label: 'Analíticas', icon: '⚗️' },
        { id: 'protocolo', label: 'Protocolo', icon: '📋' },
        { id: 'educacion', label: 'Educación', icon: '📚' },
      ];

      return (
        <div className="min-h-screen dark-bg p-6">
          {/* Header */}
          <div className="mb-8">
            <div className="flex items-center gap-3 mb-2">
              <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">&gt;&gt;</div>
              <h1 className="text-3xl font-bold">MARCETUCOACH</h1>
            </div>
            <p className="text-blue-400">Guía Interactiva de Salud</p>
          </div>

          {/* Tabs */}
          <div className="flex gap-3 mb-8 flex-wrap">
            {tabs.map(tab => (
              <button
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                className={`px-4 py-2 rounded-lg font-medium transition ${
                  activeTab === tab.id
                    ? 'bg-blue-600 text-white'
                    : 'bg-gray-800 text-gray-300 hover:bg-gray-700'
                }`}
              >
                {tab.icon} {tab.label}
              </button>
            ))}
          </div>

          {/* Content */}
          {activeTab === 'dashboard' && (
            <div className="space-y-6">
              <div className="bg-blue-600 rounded-2xl p-8">
                <h2 className="text-2xl font-bold mb-4">Bienvenido a tu Centro de Control</h2>
                <p className="text-blue-100 mb-6">Esta es tu plataforma interactiva para monitorización integral de salud en ciclos. Basada en la última evidencia. Todo lo que necesitas en un solo lugar.</p>
                <div className="grid grid-cols-3 gap-4 text-center">
                  <div className="bg-blue-500 rounded-lg p-4">
                    <div className="text-sm text-blue-200">COMPONENTES</div>
                    <div className="text-3xl font-bold">4</div>
                  </div>
                  <div className="bg-blue-500 rounded-lg p-4">
                    <div className="text-sm text-blue-200">CAPÍTULOS</div>
                    <div className="text-3xl font-bold">19+</div>
                  </div>
                  <div className="bg-blue-500 rounded-lg p-4">
                    <div className="text-sm text-blue-200">PARÁMETROS</div>
                    <div className="text-3xl font-bold">22+</div>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-2 gap-6">
                <div className="bg-gray-900 rounded-xl p-6 border border-gray-800">
                  <h3 className="text-lg font-bold mb-4">Mi Ciclo</h3>
                  <div className="space-y-4">
                    <div>
                      <label className="text-sm text-gray-400">Duración (semanas)</label>
                      <input type="number" value={duracion} onChange={e => setDuracion(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white mt-1" />
                    </div>
                    <div>
                      <label className="text-sm text-gray-400">Edad</label>
                      <input type="number" value={edad} onChange={e => setEdad(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white mt-1" />
                    </div>
                    <div>
                      <label className="text-sm text-gray-400">Experiencia</label>
                      <select value={experiencia} onChange={e => setExperiencia(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white mt-1">
                        <option>Principiante</option>
                        <option>Intermedio</option>
                        <option>Avanzado</option>
                      </select>
                    </div>
                    <div>
                      <label className="text-sm text-gray-400">Fecha inicio</label>
                      <input type="date" value={fechaInicio} onChange={e => setFechaInicio(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white mt-1" />
                    </div>
                  </div>
                </div>

                <div className="bg-gray-900 rounded-xl p-6 border border-gray-800">
                  <h3 className="text-lg font-bold mb-4">📈 Resumen Rápido</h3>
                  <div className="space-y-3">
                    <div className="flex justify-between">
                      <span className="text-gray-400">Ciclo activo</span>
                      <span className="font-bold">{duracion} semanas</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-gray-400">Tu edad</span>
                      <span className="font-bold">{edad} años</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-gray-400">Experiencia</span>
                      <span className="font-bold">{experiencia}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-gray-400">Analíticas completadas</span>
                      <span className="text-blue-400 font-bold">0/4</span>
                    </div>
                  </div>
                </div>
              </div>

              <div className="bg-yellow-900 bg-opacity-30 border border-yellow-700 rounded-lg p-4">
                <div className="flex gap-3">
                  <span className="text-xl">ℹ️</span>
                  <div>
                    <h4 className="font-bold text-yellow-200">Próximo paso: Carga tus análisis</h4>
                    <p className="text-yellow-100 text-sm mt-1">Ve a la sección "Analíticas" e ingresa tus valores. Recibirás interpretación inmediata basada en 7 meses de investigación.</p>
                  </div>
                </div>
              </div>
            </div>
          )}

          {activeTab === 'analiticas' && (
            <div className="bg-gray-900 rounded-xl p-8 border border-gray-800">
              <h2 className="text-2xl font-bold mb-4">Analíticas</h2>
              <p className="text-gray-400">Ingresa tus valores de laboratorio y obtén interpretaciones automáticas basadas en la última evidencia.</p>
              <div className="mt-6 p-4 bg-blue-600 bg-opacity-20 border border-blue-500 rounded text-blue-200">
                Próximamente: Calculadora de parámetros con interpretación automática
              </div>
            </div>
          )}

          {activeTab === 'protocolo' && (
            <div className="bg-gray-900 rounded-xl p-8 border border-gray-800">
              <h2 className="text-2xl font-bold mb-4">Protocolo</h2>
              <p className="text-gray-400">Calendario personalizado de monitorización PRE/INTRA/POST ciclo según tu duración.</p>
              <div className="mt-6 p-4 bg-blue-600 bg-opacity-20 border border-blue-500 rounded text-blue-200">
                Próximamente: Calendario interactivo de analíticas
              </div>
            </div>
          )}

          {activeTab === 'educacion' && (
            <div className="bg-gray-900 rounded-xl p-8 border border-gray-800">
              <h2 className="text-2xl font-bold mb-4">Educación</h2>
              <p className="text-gray-400 mb-6">19 capítulos organizados en 2 bloques de conocimiento.</p>
              <div className="space-y-3">
                <a href="/Guia_Salud_Completa_Interactiva.pdf" target="_blank" className="block p-4 bg-gray-800 hover:bg-gray-700 rounded-lg border border-gray-700 hover:border-blue-500 transition">
                  <div className="font-bold text-blue-400">📄 Guía de Salud Completa</div>
                  <div className="text-sm text-gray-400 mt-1">179 páginas - Todo en un documento</div>
                </a>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
